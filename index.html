<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tải ảnh icon về định dạng png hoặc jpeg, rồi vào trang
    https://www.favicon-generator.org/ tải ảnh lên rồi tạo favicon. Sau đó tải
    file zip về giải nén. Rồi copy đoạn code dưới vào đây. Chỉnh link đường dẫn, chỉnh luôn cả name="msapplication-TileImage" ở đây và file manifest.json trong thư mục favicon. (Ctrl+Shift+L để bôi đen tất cả phần giống nhau ở các dòng) -->
    <!-- add favicon -->
    <link
      rel="apple-touch-icon"
      sizes="57x57"
      href="./assets/favicon/apple-icon-57x57.png"

  <body>
    <!-- Ctrl+U khi mở trang để bấm vào các file css xem đã áp dụng được chưa -->
    <!-- Nhớ có git add . sau git init trước khi git commit -m "first commit" -->
    <!-- Sau khi push lên github xong vào setting vào pages chuyển sang nhánh main rồi lưu lại, rồi vào action theo dõi kết quả -->

    <header class="header">
      <div class="container">
        <div class="header-top">
          <!-- logo -->
          <!-- ./ Click logo → quay về trang index của thư mục hiện tại. -->
          <!-- 
          ./      Thư mục hiện tại
          ../     Lùi lên 1 thư mục cha
          ../../  Lùi lên 2 thư mục cha
          /       Thư mục gốc của website (root) -->
          <a href="./"
            ><img src="./assets/img/logo.svg" alt="shine smile" class="logo"
          /></a>

          <!-- nav -->
          <!-- nav.navbar>ul.navbar__list>li.navbar__item*4>a.navbar__link -->
          <nav class="navbar">
            <ul class="navbar__list">
              <li class="navbar__item">
                <a href="#!" class="navbar__link navbar__link--active">Home</a>
              </li>
              <li class="navbar__item">
                <a href="#!" class="navbar__link">Services</a>
              </li>
              <li class="navbar__item">
                <a href="#!" class="navbar__link">About</a>
              </li>
              <li class="navbar__item">
                <a href="#!" class="navbar__link">Doctors</a>
              </li>
            </ul>
          </nav>

          <!-- cta action -->
          <div class="header__action">
            <a href="#!" class="header__action--login">Log In</a>
            <a href="#!" class="btn header__action--signup">Sign Up</a>
          </div>
        </div>
      </div>
    </header>
